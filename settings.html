<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>自分の情報（この端末だけ）</title>
<meta name="theme-color" content="#ffffff">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<style>
  :root{
    --ink:#1a1a1a;--sub:#6b6b6b;--line:#e8e8e6;--card:#ffffff;--bg:#fafaf9;
    --accent:#c0392b;--accent-soft:#fbeceb;--good:#3f8f5f;--radius:14px;
  }
  @media (prefers-color-scheme: dark){
    :root{--ink:#f2f2f0;--sub:#9a9a95;--line:#2c2c2a;--card:#1c1c1a;--bg:#121211;--accent:#e08a80;--accent-soft:#2a1e1d;--good:#5fae7f;}
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;min-height:100vh;padding-bottom:40px;}
  header{padding:24px 20px 14px;border-bottom:1px solid var(--line);}
  .back{display:inline-block;font-size:13px;color:var(--sub);text-decoration:none;margin-bottom:10px;}
  h1{font-size:19px;margin:0 0 4px;}
  .sub{font-size:13px;color:var(--sub);margin:0;}
  main{padding:16px 16px 40px;max-width:560px;margin:0 auto;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:16px;}
  label{display:block;font-size:12px;color:var(--sub);margin:14px 0 6px;letter-spacing:.02em;}
  label:first-child{margin-top:0;}
  input[type=text]{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px;color:var(--ink);font-family:inherit;font-size:16px;padding:12px 13px;}
  input:focus{outline:none;border-color:var(--accent);}
  .save{display:block;width:100%;margin-top:20px;background:var(--accent);color:#fff;border:none;padding:14px;border-radius:12px;font-size:15px;font-weight:700;}
  .save.saved{background:var(--good);}
  .fp-preview{width:100%;border-radius:10px;display:block;margin-bottom:12px;background:#fff;}
  .fp-btn{display:block;width:100%;text-align:center;background:var(--bg);border:1px dashed var(--line);color:var(--sub);padding:14px;border-radius:12px;font-size:14px;font-weight:600;}
  .fp-remove{display:block;margin:8px auto 0;background:none;border:none;color:var(--accent);font-size:12px;}
  .note{background:var(--accent-soft);border-radius:var(--radius);padding:13px 15px;font-size:13px;line-height:1.6;color:var(--ink);margin-bottom:16px;}
  .note b{color:var(--accent);}
</style>
</head>
<body>

<header>
  <a class="back" href="index.html">← チェックリストに戻る</a>
  <h1>⚙️ 自分の情報</h1>
  <p class="sub">この端末の中だけに保存されます（ネットには一切出ません）</p>
</header>

<main>
  <div class="note"><b>大事：</b>ここに入れた住所・名前・電話・間取り図は、<b>あなたのこの端末の中だけ</b>に保存されます。アプリのコードにも、GitHubにも、どこにも送信されません。</div>

  <div class="card">
    <label>名前</label>
    <input type="text" id="f-name" placeholder="氏名を入力" autocomplete="off">
    <label>携帯番号</label>
    <input type="text" id="f-cell" placeholder="例：424-000-0000" autocomplete="off">
    <label>現住所（退去する家）</label>
    <input type="text" id="f-addrOld" placeholder="例：0000 ○○ Blvd, #0-000, Los Angeles, CA 90000" autocomplete="off">
    <label>新居の住所</label>
    <input type="text" id="f-addrNew" placeholder="例：0000 ○○ Ave #0, ○○○○" autocomplete="off">
    <button class="save" id="saveBtn">保存する</button>
  </div>

  <div class="card">
    <label style="margin-top:0;">新居の間取り図（画像）</label>
    <img class="fp-preview" id="fpPreview" alt="間取り図" style="display:none;">
    <label class="fp-btn" for="fpInput" id="fpBtn">タップして間取り図の画像を選ぶ</label>
    <input type="file" id="fpInput" accept="image/*" style="display:none;">
    <button class="fp-remove" id="fpRemove" style="display:none;">間取り図を削除</button>
  </div>
</main>

<script src="info.js"></script>
<script>
(function(){
  if (typeof MoveInfo === 'undefined') { alert('読み込みエラー。アプリを一度閉じて開き直してね。'); return; }
  var $ = function(id){ return document.getElementById(id); };
  var elName = $('f-name'), elCell = $('f-cell'), elAddrOld = $('f-addrOld'), elAddrNew = $('f-addrNew');
  var elSave = $('saveBtn');
  var elFpPreview = $('fpPreview'), elFpBtn = $('fpBtn'), elFpInput = $('fpInput'), elFpRemove = $('fpRemove');

  var info = MoveInfo.get();
  elName.value = info.name || '';
  elCell.value = info.cell || '';
  elAddrOld.value = info.addrOld || '';
  elAddrNew.value = info.addrNew || '';

  elSave.addEventListener('click', function(){
    try {
      MoveInfo.set({
        name: elName.value.trim(),
        cell: elCell.value.trim(),
        addrOld: elAddrOld.value.trim(),
        addrNew: elAddrNew.value.trim()
      });
      elSave.textContent = '保存しました ✓';
      elSave.classList.add('saved');
      setTimeout(function(){ elSave.textContent = '保存する'; elSave.classList.remove('saved'); }, 1600);
    } catch(err){
      alert('保存できませんでした。Safariのプライベートモードだと保存できないことがあります。通常モードで開いてみてね。');
    }
  });

  function renderFp(){
    var fp = MoveInfo.getFloorplan();
    if(fp){ elFpPreview.src = fp; elFpPreview.style.display = 'block'; elFpBtn.textContent = '別の画像に変える'; elFpRemove.style.display = 'block'; }
    else { elFpPreview.style.display = 'none'; elFpBtn.textContent = 'タップして間取り図の画像を選ぶ'; elFpRemove.style.display = 'none'; }
  }

  elFpInput.addEventListener('change', function(e){
    var file = e.target.files[0]; if(!file) return;
    elFpBtn.textContent = '読み込み中…';
    var r = new FileReader();
    r.onload = function(){
      var img = new Image();
      img.onload = function(){
        var max = 1400, w = img.width, h = img.height;
        if (w > max || h > max) { var s = max / Math.max(w, h); w = Math.round(w*s); h = Math.round(h*s); }
        var c = document.createElement('canvas'); c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        var out;
        try { out = c.toDataURL('image/jpeg', 0.82); } catch(err){ out = r.result; }
        try { MoveInfo.setFloorplan(out); renderFp(); }
        catch(err){ alert('画像が大きすぎて保存できませんでした。もう少し小さい画像を選んでね。（またはプライベートモードだと保存できません）'); renderFp(); }
      };
      img.onerror = function(){ alert('この画像は読み込めませんでした。別の画像を試してね。'); renderFp(); };
      img.src = r.result;
    };
    r.onerror = function(){ alert('画像を読み込めませんでした。'); renderFp(); };
    r.readAsDataURL(file);
    e.target.value = '';
  });

  elFpRemove.addEventListener('click', function(){
    if(confirm('間取り図を削除しますか？')){ MoveInfo.clearFloorplan(); renderFp(); }
  });

  renderFp();
})();
</script>
</body>
</html>
